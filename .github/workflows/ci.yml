name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run pytest
        run: uv run pytest -qx

      - name: Run behave
        run: uv run --group test behave --format progress --stop --tags=-wip

  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run Ruff
        run: uv run --group lint ruff check .

      - name: Build documentation
        run: uv run --group docs sphinx-build -W -b html docs docs/.build/html

      - name: Build distributions
        run: uv build
